name: Test Create Linear Issue Action

on:
  pull_request:

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Linear Issue
        id: create_issue
        uses: ./ # Uses the action in the current repository
        with:
          linear-api-token: ${{ secrets.LINEAR_TOKEN }}
          team-name: ${{ vars.TEAM }}
          state-name: ${{ vars.STATE }}
          issue-title: "Test Issue from GitHub Action"
          issue-description: "This is a test issue created by a GitHub Action workflow to verify the create-linear-issue action."

      - name: Get Linear Issue ID
        run: echo "LINEAR_ISSUE_ID=${{ steps.create_issue.outputs.issue-id }}" >> $GITHUB_ENV

      - name: Delete Linear Issue via GraphQL
        run: |
          curl -X POST 
          -H "Content-Type: application/json" 
          -H "Authorization: Bearer ${{ secrets.LINEAR_TOKEN }}" 
          -d '{ "query": "mutation { issueDelete(id: "'${{ env.LINEAR_ISSUE_ID }}'") { success } }" }' 
          https://api.linear.app/graphql
        env:
          LINEAR_ISSUE_ID: ${{ env.LINEAR_ISSUE_ID }} # Pass as environment variable for curl
