# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: build-and-stage-dist
        name: Build and Stage dist/index.js
        entry: bash -c "npm run build && git add dist/index.js"
        language: system
        files: ^src/.*\.ts$
        pass_filenames: false
